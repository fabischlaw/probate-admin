services:
  - type: web
    name: probate-admin
    runtime: node
    plan: starter
    buildCommand: "PUPPETEER_SKIP_DOWNLOAD=true npm install && rm -rf /opt/render/project/.cache/puppeteer && npx puppeteer browsers install chrome"
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: SESSION_SECRET
        generateValue: true
      - key: DV_API_KEY
        sync: false
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "true"
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/.cache/puppeteer
      - key: DATABASE_URL
        sync: false
    disk:
      name: probate-data
      mountPath: /var/data
      sizeGB: 1
