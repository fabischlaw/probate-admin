services:
  - type: web
    name: probate-admin
    runtime: node
    plan: starter
    buildCommand: "PUPPETEER_SKIP_DOWNLOAD=true npm install && (npx puppeteer browsers install chrome || echo 'Chrome install failed - continuing')"
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: SESSION_SECRET
        generateValue: true
      - key: DV_API_KEY
        sync: false
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "true"
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/.cache/puppeteer
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /opt/render/project/.cache/puppeteer/chrome/linux-147.0.7727.57/chrome-linux64/chrome
    disk:
      name: probate-data
      mountPath: /var/data
      sizeGB: 1
