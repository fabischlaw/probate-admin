services:
  - type: web
    name: probate-admin
    runtime: node
    plan: starter
    buildCommand: npm install && npx puppeteer browsers install chrome
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: SESSION_SECRET
        generateValue: true
      - key: DV_API_KEY
        sync: false
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/.cache/puppeteer
    disk:
      name: probate-data
      mountPath: /var/data
      sizeGB: 1
