<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Fabisch Law Probate Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f7fa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #1a1a2e;
    }
    .login-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 2.5rem 2.25rem 2rem;
      width: 100%;
      max-width: 380px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 1.75rem;
    }
    .login-logo .firm-name {
      font-size: 1.25rem;
      font-weight: 700;
      color: #1a1a2e;
      letter-spacing: 0.01em;
    }
    .login-logo .firm-sub {
      font-size: 0.78rem;
      color: #6b7280;
      margin-top: 0.2rem;
    }
    .login-title {
      font-size: 1rem;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 1.25rem;
      text-align: center;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.35rem;
    }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1.5px solid #d1d5db;
      border-radius: 7px;
      font-size: 0.9rem;
      color: #1a1a2e;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="email"]:focus,
    input[type="password"]:focus { border-color: #4f46e5; }
    .remember-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }
    .remember-row input { width: auto; }
    .remember-row label { margin: 0; font-size: 0.8rem; font-weight: 400; color: #6b7280; }
    .btn-primary {
      width: 100%;
      padding: 0.7rem;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary:hover:not(:disabled) { background: #2d2d4e; }
    .btn-primary:disabled { opacity: 0.6; cursor: default; }
    .error-msg {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #dc2626;
      border-radius: 6px;
      padding: 0.6rem 0.75rem;
      font-size: 0.8rem;
      margin-bottom: 1rem;
      display: none;
    }
    .error-msg.visible { display: block; }
    .footer-link {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.77rem;
      color: #9ca3af;
    }
    .divider {
      height: 1px;
      background: #f0f0f5;
      margin: 0 -2.25rem 1.5rem;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="firm-name">Fabisch Law Offices</div>
      <div class="firm-sub">Probate Administration System</div>
    </div>
    <div class="divider"></div>
    <div class="login-title">Sign In</div>
    <div class="error-msg" id="error-msg"></div>
    <form id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" autofocus required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required />
      </div>
      <div class="remember-row">
        <input type="checkbox" id="remember-me" name="rememberMe" />
        <label for="remember-me">Keep me signed in for 30 days</label>
      </div>
      <button type="submit" class="btn-primary" id="submit-btn">Sign In</button>
    </form>
    <div class="footer-link">Forgot your password? Contact your administrator.</div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn    = document.getElementById('submit-btn');
      const errEl  = document.getElementById('error-msg');
      const email  = document.getElementById('email').value.trim();
      const pw     = document.getElementById('password').value;
      const remember = document.getElementById('remember-me').checked;

      btn.disabled = true;
      btn.textContent = 'Signing in…';
      errEl.classList.remove('visible');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password: pw, rememberMe: remember }),
        });
        const data = await res.json();
        if (!res.ok) {
          errEl.textContent = data.error || 'Sign in failed. Please try again.';
          errEl.classList.add('visible');
          btn.disabled = false;
          btn.textContent = 'Sign In';
          return;
        }
        window.location.href = '/';
      } catch {
        errEl.textContent = 'Network error. Please try again.';
        errEl.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
